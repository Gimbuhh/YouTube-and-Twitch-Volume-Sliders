name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inspect version tag
        id: release
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          if [ "$version" = "$package_version" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Historical tag $GITHUB_REF_NAME is published from its archived assets."
          fi
      - uses: pnpm/action-setup@v4
        if: steps.release.outputs.publish == 'true'
        with:
          version: 11.0.7
      - uses: actions/setup-node@v4
        if: steps.release.outputs.publish == 'true'
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: steps.release.outputs.publish == 'true'
      - run: pnpm check
        if: steps.release.outputs.publish == 'true'
      - name: Verify release version and archive
        if: steps.release.outputs.publish == 'true'
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          test "$version" = "$package_version"
          test -f "release-notes/$version.md"
          node scripts/verify-release.mjs "$version"
      - name: Publish GitHub Release
        if: steps.release.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          youtube_asset="archive/releases/$version/YouTube Volume Slider $version/YouTube Volume Slider $version.user.js"
          twitch_asset="archive/releases/$version/Twitch Volume Slider $version/Twitch Volume Slider $version.user.js"
          youtube_public_asset="release-assets/YouTube.Volume.Slider.$version.user.js"
          twitch_public_asset="release-assets/Twitch.Volume.Slider.$version.user.js"

          mkdir -p release-assets
          cp "$youtube_asset" "$youtube_public_asset"
          cp "$twitch_asset" "$twitch_public_asset"

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "Volume Sliders $version" \
              --notes-file "release-notes/$version.md"
          else
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --title "Volume Sliders $version" \
              --notes-file "release-notes/$version.md"
          fi

          gh release upload "$GITHUB_REF_NAME" \
            "$youtube_public_asset" \
            "$twitch_public_asset" \
            --clobber

          youtube_hash="$(VERSION="$version" node -e 'console.log(require(`./archive/releases/${process.env.VERSION}/SHA256.json`).youtube.archive.toLowerCase())')"
          twitch_hash="$(VERSION="$version" node -e 'console.log(require(`./archive/releases/${process.env.VERSION}/SHA256.json`).twitch.archive.toLowerCase())')"
          youtube_digest="$(gh release view "$GITHUB_REF_NAME" --json assets --jq ".assets[] | select(.name == \"YouTube.Volume.Slider.$version.user.js\") | .digest")"
          twitch_digest="$(gh release view "$GITHUB_REF_NAME" --json assets --jq ".assets[] | select(.name == \"Twitch.Volume.Slider.$version.user.js\") | .digest")"
          test "$youtube_digest" = "sha256:$youtube_hash"
          test "$twitch_digest" = "sha256:$twitch_hash"
