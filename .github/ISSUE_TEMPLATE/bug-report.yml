name: Bug report
description: Report a problem with one of the volume sliders.
title: "[Bug]: "
labels:
  - bug
body:
  - type: dropdown
    id: site
    attributes:
      label: Site
      options:
        - YouTube
        - Twitch
        - Both
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and userscript manager
      placeholder: Firefox 128, Violentmonkey 2.18
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Include what you expected and what happened instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: Describe the shortest sequence that consistently shows the problem.
    validations:
      required: true
