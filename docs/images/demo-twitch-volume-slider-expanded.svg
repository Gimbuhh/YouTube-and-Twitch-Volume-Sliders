<svg xmlns="http://www.w3.org/2000/svg" width="552" height="104" viewBox="0 0 552 104" role="img" aria-labelledby="title desc">
  <title id="title">Expanded Twitch volume slider, new appearance</title>
  <desc id="desc">Expanded Twitch replacement volume slider using the new appearance with the volume number inside the circular arc control.</desc>
  <defs>
    <filter id="drop" x="-8%" y="-40%" width="116%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <linearGradient id="thumb" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="1" stop-color="#f0f0f0"/>
    </linearGradient>
    <linearGradient id="track" x1="0" x2="1">
      <stop offset="0" stop-color="#a970ff"/>
      <stop offset="0.260" stop-color="#9146ff"/>
      <stop offset="0.269" stop-color="#b38cff"/>
      <stop offset="0.278" stop-color="rgba(255,255,255,0.16)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.16)"/>
    </linearGradient>
    <clipPath id="pill-clip">
      <rect x="16" y="20" width="446.4" height="64" rx="32"/>
    </clipPath>
  </defs>

  <g filter="url(#drop)">
    <g clip-path="url(#pill-clip)">
      <rect x="16" y="20" width="446.4" height="64" rx="32" fill="rgba(55,48,62,0.68)"/>

      <g transform="translate(24 20)">
        <circle cx="32" cy="32" r="23.4" fill="none" stroke="rgba(255,255,255,0.42)" stroke-width="4.4" transform="rotate(-90 32 32)"/>
        <circle cx="32" cy="32" r="23.4" fill="none" stroke="#a970ff" stroke-width="4.4" stroke-dasharray="25 100" pathLength="100" transform="rotate(-90 32 32)" stroke-linecap="round"/>
        <text x="32" y="32" fill="rgba(255,255,255,0.96)" font-family="YouTube Noto, Roboto, Arial, Helvetica, sans-serif" font-size="22.4" font-weight="800" font-variant-numeric="tabular-nums" text-anchor="middle" dominant-baseline="central" alignment-baseline="central" text-shadow="0 0 3px rgba(0,0,0,0.75)">25</text>
      </g>

      <g transform="translate(96 52)">
        <rect x="0" y="-6.6" width="347.2" height="13.2" rx="6.6" fill="url(#track)"/>
        <g opacity="0.55">
          <path d="M29.24 -6.6v13.2M45.28 -6.6v13.2M61.32 -6.6v13.2M77.36 -6.6v13.2M93.4 -6.6v13.2M109.44 -6.6v13.2M125.48 -6.6v13.2M141.52 -6.6v13.2M157.56 -6.6v13.2M173.6 -6.6v13.2M189.64 -6.6v13.2M205.68 -6.6v13.2M221.72 -6.6v13.2M237.76 -6.6v13.2M253.8 -6.6v13.2M269.84 -6.6v13.2M285.88 -6.6v13.2M301.92 -6.6v13.2M317.96 -6.6v13.2" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
        </g>
        <circle cx="93.4" cy="0" r="13.2" fill="url(#thumb)"/>
        <circle cx="93.4" cy="0" r="12.7" fill="none" stroke="rgba(0,0,0,0.12)"/>
      </g>
    </g>
  </g>
</svg>
