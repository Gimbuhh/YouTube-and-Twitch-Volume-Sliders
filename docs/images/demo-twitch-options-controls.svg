<svg xmlns="http://www.w3.org/2000/svg" width="288" height="64" viewBox="0 0 288 64" role="img" aria-labelledby="title desc">
  <title id="title">Twitch controls with Volume Slider Options button</title>
  <desc id="desc">A cropped Twitch controls strip showing the Volume Slider Options button highlighted next to the standard settings button.</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-28%" width="116%" height="156%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.34"/>
    </filter>
    <style>
      .icon{fill:#efeff1}
      .button{fill:transparent}
      .button-active{fill:rgba(255,255,255,.16)}
      .quality{fill:#efeff1;font:700 12px/16px Arial,Helvetica,sans-serif}
    </style>
  </defs>

  <rect x="8.5" y="2.5" width="271" height="55" rx="8" fill="rgba(14,14,16,0.96)" stroke="rgba(255,255,255,0.12)" filter="url(#shadow)"/>
  <rect x="20" y="14" width="248" height="3" rx="1.5" fill="rgba(255,255,255,0.25)"/>
  <rect x="20" y="14" width="82" height="3" rx="1.5" fill="#9146ff"/>

