<svg xmlns="http://www.w3.org/2000/svg" width="552" height="104" viewBox="0 0 552 104" role="img" aria-labelledby="title desc">
  <title id="title">Expanded YouTube volume slider, classic appearance</title>
  <desc id="desc">Expanded YouTube replacement volume slider using the classic appearance with a speaker icon in the circular control and a separate 25 percent volume label.</desc>
  <defs>
    <filter id="drop" x="-8%" y="-40%" width="116%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <linearGradient id="thumb" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="1" stop-color="#f0f0f0"/>
    </linearGradient>
    <linearGradient id="track" x1="0" x2="1">
      <stop offset="0" stop-color="#cc4444"/>
      <stop offset="0.260" stop-color="#bb3333"/>
      <stop offset="0.269" stop-color="#cc5555"/>
      <stop offset="0.278" stop-color="rgba(255,255,255,0.16)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.16)"/>
    </linearGradient>
    <clipPath id="pill-clip">
      <rect x="16" y="20" width="520" height="64" rx="32"/>
    </clipPath>
  </defs>

  <g filter="url(#drop)">
    <g clip-path="url(#pill-clip)">
      <rect x="16" y="20" width="520" height="64" rx="32" fill="rgba(42,43,55,0.68)"/>

