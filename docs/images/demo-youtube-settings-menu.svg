<svg xmlns="http://www.w3.org/2000/svg" width="420" height="560" viewBox="0 0 420 560" role="img" aria-labelledby="title desc">
  <title id="title">Volume slider settings menu</title>
  <desc id="desc">Transparent demo of the Volume Slider Options popover with mode, position, behavior, and bar thickness settings.</desc>
  <defs>
    <filter id="menu-shadow" x="-18%" y="-10%" width="136%" height="124%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000" flood-opacity="0.34"/>
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.26"/>
    </filter>
    <style>
      .label{fill:rgba(255,255,255,.55);font:600 11px Arial,Helvetica,sans-serif;letter-spacing:.04em}
      .body{fill:#fff;font:400 13px Arial,Helvetica,sans-serif}
      .value{fill:rgba(255,255,255,.65);font:400 12px Arial,Helvetica,sans-serif}
      .radio{fill:rgba(255,255,255,.82);font:700 12px Arial,Helvetica,sans-serif}
      .radio-on{fill:#fff;font:700 12px Arial,Helvetica,sans-serif}
    </style>
  </defs>

  <g filter="url(#menu-shadow)">
    <rect x="66" y="24" width="288" height="512" rx="8" fill="rgba(18,18,18,0.97)"/>
    <rect x="66.5" y="24.5" width="287" height="511" rx="7.5" fill="none" stroke="rgba(255,255,255,0.12)"/>
  </g>

  <line x1="66" y1="68" x2="354" y2="68" stroke="rgba(255,255,255,0.1)"/>
  <text x="82" y="52" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500">Volume Slider Options</text>

  <text class="label" x="82" y="93">MODE</text>
  <rect x="82" y="106" width="82" height="34" rx="6" fill="#bb3333"/>
  <rect x="170" y="106" width="82" height="34" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.14)"/>
  <text class="radio-on" x="123" y="127" text-anchor="middle">On</text>
  <text class="radio" x="211" y="127" text-anchor="middle">Off</text>
  <rect x="82" y="148" width="256" height="34" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.14)"/>
  <text class="radio" x="210" y="170" text-anchor="middle">Replace native</text>

  <line x1="66" y1="204" x2="354" y2="204" stroke="rgba(255,255,255,0.08)"/>
  <text class="label" x="82" y="229">POSITION WHEN REPLACING NATIVE</text>
  <rect x="82" y="242" width="125" height="34" rx="6" fill="#bb3333"/>
  <rect x="213" y="242" width="125" height="34" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.14)"/>
  <text class="radio-on" x="144.5" y="264" text-anchor="middle">Native spot</text>
  <text class="radio" x="275.5" y="264" text-anchor="middle">Custom spot</text>

  <line x1="66" y1="298" x2="354" y2="298" stroke="rgba(255,255,255,0.08)"/>
  <text class="label" x="82" y="323">SLIDER BEHAVIOR</text>
  <text class="body" x="90" y="351">Snap to 5%</text>
  <rect x="312" y="336" width="18" height="18" rx="3" fill="#bb3333"/>
  <path d="m316 345 4 4 7-9" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="body" x="90" y="383">Always expanded</text>
  <rect x="312" y="368" width="18" height="18" rx="3" fill="transparent" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <text class="body" x="90" y="415">Show on video</text>
  <rect x="312" y="400" width="18" height="18" rx="3" fill="transparent" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>

  <line x1="66" y1="438" x2="354" y2="438" stroke="rgba(255,255,255,0.08)"/>
  <text class="label" x="82" y="463">SLIDER APPEARANCE</text>
  <text class="body" x="82" y="490">Bar thickness</text>
  <text class="value" x="166" y="490">75%</text>
  <rect x="82" y="504" width="170" height="4" rx="2" fill="rgba(255,255,255,0.22)"/>
  <rect x="82" y="504" width="128" height="4" rx="2" fill="rgba(255,255,255,0.92)"/>
  <circle cx="210" cy="506" r="7" fill="#fff"/>
  <rect x="272" y="492" width="52" height="28" rx="6" fill="rgba(255,255,255,0.12)"/>
  <text x="298" y="510" fill="rgba(255,255,255,0.9)" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="500" text-anchor="middle">Reset</text>
</svg>
