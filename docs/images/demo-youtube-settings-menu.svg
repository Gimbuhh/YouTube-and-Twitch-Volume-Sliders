<svg xmlns="http://www.w3.org/2000/svg" width="288" height="500" viewBox="0 0 288 500" role="img" aria-labelledby="title desc">
  <title id="title">YouTube volume slider settings menu</title>
  <desc id="desc">Volume Slider Options popover matching the real script with replace native mode, native spot placement, snap to 5 percent enabled, and the new slider appearance selected.</desc>
  <defs>
    <filter id="shadow" x="-16%" y="-8%" width="132%" height="118%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.48"/>
    </filter>
    <style>
      .title{fill:#fff;font:500 14px/20px Arial,Helvetica,sans-serif}
      .section{fill:rgba(255,255,255,.55);font:500 11px/14px Arial,Helvetica,sans-serif;letter-spacing:.04em}
      .radio{fill:rgba(255,255,255,.82);font:600 12px/16px Arial,Helvetica,sans-serif}
      .radio-on{fill:#fff;font:600 12px/16px Arial,Helvetica,sans-serif}
      .row{fill:#fff;font:400 13px/18px Arial,Helvetica,sans-serif}
      .value{fill:rgba(255,255,255,.65);font:400 12px/18px Arial,Helvetica,sans-serif}
      .reset{fill:rgba(255,255,255,.9);font:500 11px/16px Arial,Helvetica,sans-serif}
    </style>
  </defs>

  <g filter="url(#shadow)">
    <rect x=".5" y=".5" width="287" height="499" rx="8" fill="rgba(18,18,18,0.97)" stroke="rgba(255,255,255,0.12)"/>
  </g>
  <line x1="0" y1="44.5" x2="288" y2="44.5" stroke="rgba(255,255,255,0.1)"/>
  <text class="title" x="16" y="28">Volume Slider Options</text>

  <text class="section" x="16" y="67">MODE</text>
  <rect x="16" y="82" width="125" height="34" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.14)"/>
  <rect x="147" y="82" width="125" height="34" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.14)"/>
  <text class="radio" x="78.5" y="103" text-anchor="middle">On</text>
  <text class="radio" x="209.5" y="103" text-anchor="middle">Off</text>
  <rect x="16" y="124" width="256" height="34" rx="6" fill="#bb3333"/>
  <text class="radio-on" x="144" y="145" text-anchor="middle">Replace native</text>

  <line x1="0" y1="167" x2="288" y2="167" stroke="rgba(255,255,255,0.08)"/>
  <text class="section" x="16" y="191">POSITION WHEN REPLACING NATIVE</text>
  <rect x="16" y="206" width="125" height="34" rx="6" fill="#bb3333"/>
  <rect x="147" y="206" width="125" height="34" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.14)"/>
  <text class="radio-on" x="78.5" y="227" text-anchor="middle">Native spot</text>
  <text class="radio" x="209.5" y="227" text-anchor="middle">Custom spot</text>

  <line x1="0" y1="249" x2="288" y2="249" stroke="rgba(255,255,255,0.08)"/>
  <text class="section" x="16" y="273">SLIDER BEHAVIOR</text>
  <text class="row" x="16" y="307">Snap to 5%</text>
  <rect x="254" y="294" width="18" height="18" rx="3" fill="#bb3333"/>
  <path d="m258 303 4 4 7-9" fill="none" stroke="#fff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="row" x="16" y="339">Always expanded</text>
  <rect x="254.75" y="326.75" width="16.5" height="16.5" rx="2.5" fill="transparent" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <text class="row" x="16" y="371">Show on video</text>
  <rect x="254.75" y="358.75" width="16.5" height="16.5" rx="2.5" fill="transparent" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>

  <line x1="0" y1="393" x2="288" y2="393" stroke="rgba(255,255,255,0.08)"/>
  <text class="section" x="16" y="417">SLIDER APPEARANCE</text>
  <rect x="16" y="438" width="125" height="34" rx="6" fill="#bb3333"/>
  <rect x="147" y="438" width="125" height="34" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.14)"/>
  <text class="radio-on" x="78.5" y="459" text-anchor="middle">New</text>
  <text class="radio" x="209.5" y="459" text-anchor="middle">Classic</text>
</svg>
